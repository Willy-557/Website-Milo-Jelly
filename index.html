<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milo Jelly | Order</title>
    <link rel="stylesheet" href="order.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="navbar">
        <div class="navbar-left">
            <a href="#"><img src="logo2.png" alt="Logo Milo Jelly"></a>
        </div>
    </div>

    <div class="container">
        <div class="container-left">
            <img src="milojellybotol.jpg.png" alt="Produk Milo Jelly">
            <div class="badges">
                <span class="badge">Freshly Made</span>
                <span class="badge">Real Milo Jelly</span>
            </div>
        </div>
        

        <div class="container-right">
            <h2 id="header1">Konfirmasi Pesanan</h2>
            <p class="subtitle">Lengkapi data di bawah ini untuk memesan kelezatan Milo Jelly.</p>
            
            <form id="orderForm">
                <div class="form-group">
                    <label for="nama_pengguna">NAMA LENGKAP</label>
                    <input type="text" id="nama_pengguna" name="nama" placeholder="Masukkan nama lengkap Anda">
                </div>
                
                <div class="form-group">
                    <label for="jumlah">JUMLAH PESANAN</label>
                    <div class="input-wrapper">
                        <input type="number" id="jumlah" name="jumlah" placeholder="0">
                        <span class="suffix">Botol</span>
                    </div>
                </div>
                
                <a href="#" class="btn-wa">
                    <img src="logowa3.png" alt="Logo WA">
                    <span>Kirim via WhatsApp</span>
                </a>
            </form>
        </div>
    </div>
    <script>
        document.querySelector('.btn-wa').addEventListener('click', function(e) {
            e.preventDefault();

            
            const scriptURL = 'https://script.google.com/macros/s/AKfycbyVWc5KeIGIFwVBiiawjpdNsk4gJ_3z8f_xpzzn2p0t75_yy9FYb3uTa9L2R6oFGyiF9w/exec'; 

            
            const nama = document.getElementById('nama_pengguna').value;
            const jumlah = document.getElementById('jumlah').value;

            
            if (nama.trim() === '') {
                alert('Halo! Mohon isi Nama Lengkap Anda terlebih dahulu ya.');
                return;
            }
            if (jumlah === '' || jumlah <= 0) {
                alert('Mohon masukkan jumlah pesanan yang benar (minimal 1).');
                return;
            }

            
            const hargaPerBotol = 15000;
            const totalHarga = jumlah * hargaPerBotol;

            
            const formatRupiah = (angka) => {
                return 'Rp ' + angka.toLocaleString('id-ID');
            };

            
            const btn = document.querySelector('.btn-wa');
            const teksTombolAsli = btn.innerHTML;
            btn.innerHTML = '<span>Mencatat Pesanan... Tunggu ya ⏳</span>';

            
            const formData = new FormData();
            formData.append('nama', nama);
            formData.append('jumlah', jumlah);
            formData.append('total', totalHarga);

            
            fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' })
                .then(response => {
                    
                    const pesan = `Halo Milo Jelly Station! 👋\n\nNama Pemesan: *${nama}*\n\nRincian Pesanan:\n1. Milo Original Jelly (${jumlah}x) - ${formatRupiah(totalHarga)}\n\n━━━━━━━━━━━━━━\nTOTAL: *${formatRupiah(totalHarga)}*\n━━━━━━━━━━━━━━\n\nMohon segera diproses ya Kak, terima kasih! 🙏`;

                    
                    const nomorWA = '6283123285268'; 

                    const linkWA = `https://api.whatsapp.com/send?phone=${nomorWA}&text=${encodeURIComponent(pesan)}`;
                    
                    
                    btn.innerHTML = teksTombolAsli;
                    
                    
                    window.open(linkWA, '_blank');
                })
                .catch(error => {
                    
                    console.error('Error!', error.message);
                    alert('Gagal menyambungkan ke sistem pembukuan, tapi Anda tetap bisa memesan via WA.');
                    btn.innerHTML = teksTombolAsli;
                });
        });
    </script>
</body>
</html>
